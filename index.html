<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapeutic Quiz Portal</title>
    <style>
        :root {
            --olive-green: #556B2F; /* الأخضر الزيتوني */
            --light-beige: #F5F5DC; /* البيجي الفاتح */
            --dark-text: #1a1a1a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--light-beige);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-card {
            background-color: var(--white);
            width: 90%;
            max-width: 600px;
            padding: 60px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            border-bottom: 15px solid var(--olive-green);
        }

        .file-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            color: var(--olive-green);
            font-size: 2.5rem;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .description {
            color: var(--dark-text);
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .btn-start {
            background-color: var(--olive-green);
            color: var(--white);
            border: none;
            padding: 20px 60px;
            font-size: 1.4rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(85, 107, 47, 0.3);
        }

        .btn-start:hover {
            transform: scale(1.05);
            background-color: #3d4d22;
            box-shadow: 0 15px 30px rgba(85, 107, 47, 0.4);
        }

        .file-name-tag {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
            background: #f0f0e0;
            padding: 5px 15px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <span class="file-icon">📄</span>
        <h1>الاختبار الشامل للمادة</h1>
        
        <p class="description">
            مرحباً بك في منصة الاختبار التفاعلية. <br>
            هذا الاختبار مبني بالكامل على ملف <b>Therapeutic</b> <br>
            يحتوي على 100 سؤال MCQ تغطي كافة التفاصيل بدقة.
        </p>

        <button class="btn-start" onclick="startTest()">دخول الاختبار</button>

        <br>
        <div class="file-name-tag">
            المصدر: Therapeutic.html
        </div>
    </div>

    <script>
        function startTest() {
            // هذا التنبيه للتأكيد، يمكنك ربط الكود بصفحة الأسئلة هنا
            alert("بالتوفيق في اختبار Therapeutic!");
            // window.location.href = "questions.html"; 
        }
    </script>

</body>
</html>
